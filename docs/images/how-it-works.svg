<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" font-family="'Segoe UI', Arial, Helvetica, sans-serif">
  <defs>
    <!-- Shadows -->
    <filter id="shadow" x="-6%" y="-6%" width="116%" height="125%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <filter id="shadow-sm" x="-8%" y="-8%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0F172A" flood-opacity="0.06"/>
    </filter>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#10B981" flood-opacity="0.15" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Card header gradients -->
    <linearGradient id="g-ask" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10B981"/><stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="g-route" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0078D4"/><stop offset="100%" stop-color="#005BA1"/>
    </linearGradient>
    <linearGradient id="g-ref" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/><stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="g-exec" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/><stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="g-est" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10B981"/><stop offset="100%" stop-color="#059669"/>
    </linearGradient>

    <!-- Metric gauge gradients -->
    <linearGradient id="g-gauge-green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#059669"/><stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="g-gauge-blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0078D4"/><stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>

    <!-- Arrows -->
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#0078D4"/>
    </marker>
    <marker id="arr-muted" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#94A3B8"/>
    </marker>
    <marker id="arr-amber" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#D97706"/>
    </marker>
  </defs>

  <!-- ======================== BACKGROUND ======================== -->
  <rect width="960" height="500" rx="16" fill="#F8FAFC"/>
  <rect width="960" height="500" rx="16" fill="none" stroke="#E2E8F0" stroke-width="1"/>
  <!-- Subtle texture -->
  <g opacity="0.015">
    <line x1="0" y1="0" x2="960" y2="520" stroke="#0078D4" stroke-width="90"/>
    <line x1="250" y1="0" x2="960" y2="380" stroke="#0078D4" stroke-width="90"/>
    <line x1="550" y1="0" x2="960" y2="220" stroke="#0078D4" stroke-width="90"/>
    <line x1="-200" y1="0" x2="960" y2="620" stroke="#0078D4" stroke-width="90"/>
  </g>

  <!-- ======================== TITLE ======================== -->
  <text x="480" y="36" text-anchor="middle" font-size="13" font-weight="700" letter-spacing="2.5" fill="#0078D4">HOW IT WORKS</text>

  <!-- ======================== 5 STAGE CARDS ======================== -->
  <!-- Layout: 5 cards × 138px + 4 gaps × 24px = 786px  →  left margin = (960-786)/2 = 87 -->

  <!-- ===== CARD 1: ASK ===== -->
  <g transform="translate(87, 56)">
    <rect width="138" height="150" rx="12" fill="white" filter="url(#shadow)"/>
    <rect width="138" height="52" rx="12" fill="url(#g-ask)"/>
    <rect y="40" width="138" height="12" fill="url(#g-ask)"/>
    <circle cx="22" cy="21" r="12" fill="white" fill-opacity="0.25"/>
    <text x="22" y="26" text-anchor="middle" font-size="12" font-weight="700" fill="white">1</text>
    <!-- Chat icon -->
    <g transform="translate(54, 10)">
      <rect x="0" y="0" width="32" height="22" rx="5" fill="white" fill-opacity="0.3"/>
      <path d="M6,16 L6,24 L13,16" fill="white" fill-opacity="0.3"/>
      <line x1="8" y1="7" x2="24" y2="7" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
      <line x1="8" y1="13" x2="18" y2="13" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    </g>
    <text x="69" y="76" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">Ask</text>
    <text x="69" y="96" text-anchor="middle" font-size="10.5" fill="#64748B">Natural language</text>
    <text x="69" y="110" text-anchor="middle" font-size="10.5" fill="#64748B">question about</text>
    <text x="69" y="124" text-anchor="middle" font-size="10.5" fill="#64748B">Azure costs</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="229" y1="131" x2="249" y2="131" stroke="#0078D4" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ===== CARD 2: ROUTE ===== -->
  <g transform="translate(253, 56)">
    <rect width="138" height="150" rx="12" fill="white" filter="url(#shadow)"/>
    <rect width="138" height="52" rx="12" fill="url(#g-route)"/>
    <rect y="40" width="138" height="12" fill="url(#g-route)"/>
    <circle cx="22" cy="21" r="12" fill="white" fill-opacity="0.25"/>
    <text x="22" y="26" text-anchor="middle" font-size="12" font-weight="700" fill="white">2</text>
    <!-- Signpost icon -->
    <g transform="translate(56, 6)">
      <line x1="15" y1="6" x2="15" y2="36" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
      <polygon points="3,9 27,9 29,15 3,15" fill="white" fill-opacity="0.35" stroke="white" stroke-width="1" opacity="0.9"/>
      <polygon points="1,21 25,21 25,27 3,27" fill="white" fill-opacity="0.2" stroke="white" stroke-width="1" opacity="0.7"/>
    </g>
    <text x="69" y="76" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">Route</text>
    <text x="69" y="96" text-anchor="middle" font-size="10.5" fill="#64748B">Identifies the Azure</text>
    <text x="69" y="110" text-anchor="middle" font-size="10.5" fill="#64748B">service and loads</text>
    <text x="69" y="124" text-anchor="middle" font-size="10.5" fill="#64748B">its reference</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="395" y1="131" x2="415" y2="131" stroke="#0078D4" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ===== CARD 3: REFERENCE ===== -->
  <g transform="translate(419, 56)">
    <rect width="138" height="150" rx="12" fill="white" filter="url(#shadow)"/>
    <rect width="138" height="52" rx="12" fill="url(#g-ref)"/>
    <rect y="40" width="138" height="12" fill="url(#g-ref)"/>
    <circle cx="22" cy="21" r="12" fill="white" fill-opacity="0.25"/>
    <text x="22" y="26" text-anchor="middle" font-size="12" font-weight="700" fill="white">3</text>
    <!-- Checklist icon -->
    <g transform="translate(50, 6)">
      <rect x="4" y="2" width="28" height="34" rx="4" fill="white" fill-opacity="0.3" stroke="white" stroke-width="1" opacity="0.9"/>
      <polyline points="11,13 14,16 19,10" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
      <line x1="22" y1="13" x2="28" y2="13" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
      <polyline points="11,23 14,26 19,20" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
      <line x1="22" y1="23" x2="27" y2="23" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    </g>
    <text x="69" y="76" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">Reference</text>
    <text x="69" y="96" text-anchor="middle" font-size="10.5" fill="#64748B">Pre-verified filters,</text>
    <text x="69" y="110" text-anchor="middle" font-size="10.5" fill="#64748B">cost formulas,</text>
    <text x="69" y="124" text-anchor="middle" font-size="10.5" fill="#64748B">and known traps</text>
  </g>

  <!-- Arrow 3→4 -->
  <line x1="561" y1="131" x2="581" y2="131" stroke="#0078D4" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ===== CARD 4: EXECUTE ===== -->
  <g transform="translate(585, 56)">
    <rect width="138" height="150" rx="12" fill="white" filter="url(#shadow)"/>
    <rect width="138" height="52" rx="12" fill="url(#g-exec)"/>
    <rect y="40" width="138" height="12" fill="url(#g-exec)"/>
    <circle cx="22" cy="21" r="12" fill="white" fill-opacity="0.25"/>
    <text x="22" y="26" text-anchor="middle" font-size="12" font-weight="700" fill="white">4</text>
    <!-- Terminal icon -->
    <g transform="translate(46, 6)">
      <rect x="0" y="0" width="42" height="32" rx="5" fill="white" fill-opacity="0.2" stroke="white" stroke-width="1.5" opacity="0.9"/>
      <polyline points="10,11 17,17 10,23" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
      <line x1="21" y1="23" x2="32" y2="23" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    </g>
    <text x="69" y="76" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">Execute</text>
    <text x="69" y="96" text-anchor="middle" font-size="10.5" fill="#64748B">Queries the live</text>
    <text x="69" y="110" text-anchor="middle" font-size="10.5" fill="#64748B">Azure Retail</text>
    <text x="69" y="124" text-anchor="middle" font-size="10.5" fill="#64748B">Prices API</text>
  </g>

  <!-- Arrow 4→5 -->
  <line x1="727" y1="131" x2="747" y2="131" stroke="#0078D4" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ===== CARD 5: ESTIMATE ===== -->
  <g transform="translate(751, 56)">
    <rect width="138" height="150" rx="12" fill="white" filter="url(#shadow)" stroke="#10B981" stroke-width="1.5"/>
    <rect width="138" height="52" rx="12" fill="url(#g-est)"/>
    <rect y="40" width="138" height="12" fill="url(#g-est)"/>
    <circle cx="22" cy="21" r="12" fill="white" fill-opacity="0.25"/>
    <text x="22" y="26" text-anchor="middle" font-size="12" font-weight="700" fill="white">5</text>
    <!-- Chart icon -->
    <g transform="translate(42, 6)">
      <rect x="6" y="20" width="8" height="13" rx="2" fill="white" fill-opacity="0.25" stroke="white" stroke-width="1"/>
      <rect x="18" y="12" width="8" height="21" rx="2" fill="white" fill-opacity="0.35" stroke="white" stroke-width="1"/>
      <rect x="30" y="4" width="8" height="29" rx="2" fill="white" fill-opacity="0.5" stroke="white" stroke-width="1"/>
      <polyline points="10,18 22,10 34,3" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
      <circle cx="34" cy="3" r="2.5" fill="white" opacity="0.9"/>
    </g>
    <text x="69" y="76" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">Estimate</text>
    <text x="69" y="96" text-anchor="middle" font-size="10.5" fill="#64748B">Structured cost</text>
    <text x="69" y="110" text-anchor="middle" font-size="10.5" fill="#64748B">breakdown with</text>
    <text x="69" y="124" text-anchor="middle" font-size="10.5" fill="#64748B">monthly totals</text>
  </g>

  <!-- ======================== DIVIDER ======================== -->
  <line x1="87" y1="228" x2="873" y2="228" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- ======================== MIDDLE ROW: CONTEXT + API ======================== -->

  <!-- ===== Azure API Cloud (right) ===== -->
  <g transform="translate(734, 248)">
    <path d="M34,60 C10,60 0,46 2,32 C4,18 18,10 30,12 C34,0 48,-4 62,4 C72,-4 90,0 94,12 C108,12 118,24 114,34 C110,48 100,60 84,60 Z"
          fill="white" filter="url(#shadow-sm)" stroke="#0078D4" stroke-width="1.5"/>
    <text x="57" y="32" text-anchor="middle" font-size="10.5" font-weight="700" fill="#0078D4">Azure Retail</text>
    <text x="57" y="46" text-anchor="middle" font-size="10.5" font-weight="700" fill="#0078D4">Prices API</text>
  </g>

  <!-- Arrow: Card 4 ↔ Azure Cloud -->
  <path d="M654,206 L654,228 Q654,244 690,256 L734,268" fill="none" stroke="#D97706" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-amber)"/>
  <text x="672" y="240" font-size="8" fill="#D97706" font-weight="600">live data</text>

  <!-- ===== On-demand context section ===== -->
  <text x="290" y="252" text-anchor="middle" font-size="10" font-weight="700" letter-spacing="1.2" fill="#94A3B8">ON-DEMAND CONTEXT</text>

  <!-- Pill 1: Pitfalls -->
  <g transform="translate(60, 266)">
    <rect width="160" height="44" rx="10" fill="white" filter="url(#shadow-sm)" stroke="#E2E8F0" stroke-width="1"/>
    <rect width="160" height="44" rx="10" fill="#FEF3C7" opacity="0.2"/>
    <circle cx="24" cy="22" r="11" fill="#F59E0B" opacity="0.15"/>
    <text x="24" y="27" text-anchor="middle" font-size="13" font-weight="700" fill="#D97706">!</text>
    <text x="44" y="18" font-size="10.5" font-weight="700" fill="#1E293B">Known Pitfalls</text>
    <text x="44" y="32" font-size="8.5" fill="#64748B">Common pricing traps</text>
  </g>

  <!-- Pill 2: Reserved Instances -->
  <g transform="translate(234, 266)">
    <rect width="160" height="44" rx="10" fill="white" filter="url(#shadow-sm)" stroke="#E2E8F0" stroke-width="1"/>
    <rect width="160" height="44" rx="10" fill="#DBEAFE" opacity="0.2"/>
    <circle cx="24" cy="22" r="11" fill="#0078D4" opacity="0.15"/>
    <text x="24" y="27" text-anchor="middle" font-size="11" font-weight="700" fill="#0078D4">R</text>
    <text x="44" y="18" font-size="10.5" font-weight="700" fill="#1E293B">Reserved Instances</text>
    <text x="44" y="32" font-size="8.5" fill="#64748B">RI &amp; savings plans</text>
  </g>

  <!-- Pill 3: Regions & Currencies -->
  <g transform="translate(408, 266)">
    <rect width="160" height="44" rx="10" fill="white" filter="url(#shadow-sm)" stroke="#E2E8F0" stroke-width="1"/>
    <rect width="160" height="44" rx="10" fill="#EDE9FE" opacity="0.2"/>
    <circle cx="24" cy="22" r="11" fill="#6366F1" opacity="0.15"/>
    <text x="24" y="27" text-anchor="middle" font-size="11" font-weight="700" fill="#6366F1">$</text>
    <text x="44" y="18" font-size="10.5" font-weight="700" fill="#1E293B">Regions &amp; Currencies</text>
    <text x="44" y="32" font-size="8.5" fill="#64748B">Multi-currency support</text>
  </g>

  <!-- Dotted lines from pills up to Execute card -->
  <path d="M140,266 Q140,242 400,234 Q590,228 654,206" fill="none" stroke="#94A3B8" stroke-width="1" stroke-dasharray="3,3"/>
  <path d="M314,266 Q314,246 510,236 Q610,230 654,206" fill="none" stroke="#94A3B8" stroke-width="1" stroke-dasharray="3,3"/>
  <path d="M488,266 Q488,248 590,238 Q640,232 654,206" fill="none" stroke="#94A3B8" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arr-muted)"/>

  <!-- ======================== KEY METRICS ROW ======================== -->
  <line x1="87" y1="332" x2="873" y2="332" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="480" y="356" text-anchor="middle" font-size="10" font-weight="700" letter-spacing="1.2" fill="#94A3B8">KEY METRICS</text>

  <!-- Metric card 1: Cost Determinism -->
  <g transform="translate(87, 370)">
    <rect width="380" height="86" rx="12" fill="white" filter="url(#shadow-sm)" stroke="#E2E8F0" stroke-width="1"/>

    <!-- Left accent bar -->
    <rect x="0" y="0" width="4" height="86" rx="2" fill="#10B981"/>

    <!-- Icon circle -->
    <circle cx="40" cy="36" r="18" fill="#ECFDF5"/>
    <!-- Target/bullseye icon -->
    <circle cx="40" cy="36" r="11" fill="none" stroke="#10B981" stroke-width="2"/>
    <circle cx="40" cy="36" r="5.5" fill="none" stroke="#10B981" stroke-width="1.5"/>
    <circle cx="40" cy="36" r="2" fill="#10B981"/>

    <!-- Text -->
    <text x="72" y="30" font-size="14" font-weight="700" fill="#1E293B">Cost Determinism</text>
    <text x="72" y="46" font-size="10.5" fill="#64748B">Equivalent intent → same API call → same price</text>

    <text x="72" y="64" font-size="10" fill="#94A3B8">Pre-verified filters + scripted API calls</text>
  </g>

  <!-- Metric card 2: Token Efficiency -->
  <g transform="translate(493, 370)">
    <rect width="380" height="86" rx="12" fill="white" filter="url(#shadow-sm)" stroke="#E2E8F0" stroke-width="1"/>

    <!-- Left accent bar -->
    <rect x="0" y="0" width="4" height="86" rx="2" fill="#0078D4"/>

    <!-- Icon circle -->
    <circle cx="40" cy="36" r="18" fill="#EFF6FF"/>
    <!-- Lightning/efficiency icon -->
    <polygon points="42,20 36,36 42,36 38,52 48,33 42,33 46,20" fill="#0078D4"/>

    <!-- Text -->
    <text x="72" y="30" font-size="14" font-weight="700" fill="#1E293B">Token Efficiency</text>
    <text x="72" y="46" font-size="10.5" fill="#64748B">Only load what's needed, when it's needed</text>

    <text x="72" y="64" font-size="10" fill="#94A3B8">On-demand loading · batch optimised</text>
  </g>

  <!-- ======================== FOOTER ======================== -->
  <text x="480" y="488" text-anchor="middle" font-size="9.5" fill="#94A3B8">All prices sourced from the live Azure Retail Prices API · No subscription required · 210+ services supported</text>
</svg>