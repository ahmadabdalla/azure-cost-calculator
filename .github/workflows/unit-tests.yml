# ---------------------------------------------------------
# Unit Tests
# ---------------------------------------------------------
# Runs PowerShell (Pester 5) and Bash (bats-core) unit tests
# for the core skill scripts whenever a PR touches script
# source or test files.
# ---------------------------------------------------------

name: Unit Tests

on:
  pull_request:
    branches: [dev, main]
    paths:
      - "skills/azure-cost-calculator/scripts/**"
      - "tests/unit/**"
  push:
    branches: [dev]
    paths:
      - "skills/azure-cost-calculator/scripts/**"
      - "tests/unit/**"

permissions:
  contents: read

jobs:
  powershell-tests:
    name: PowerShell (Pester 5)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: |
          Install-Module -Name Pester -MinimumVersion 5.0.0 -Force -Scope CurrentUser -SkipPublisherCheck
          Import-Module Pester -MinimumVersion 5.0.0
          Get-Module Pester | Select-Object Name, Version

      - name: Run Pester tests
        shell: pwsh
        run: |
          pwsh tests/unit/Run-PesterTests.ps1 -OutputFormat Detailed -CIOutputPath results/pester.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pester-results
          path: results/pester.xml

  bash-tests:
    name: Bash (bats-core)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install bats-core
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq bats
          bats --version

      - name: Run bats tests
        run: bash tests/unit/run-bats-tests.sh
