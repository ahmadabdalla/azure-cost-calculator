name: Create Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Tag and release
    if: >-
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.title, 'release: ')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Extract version from plugin.json
        id: version
        run: |
          VERSION=$(jq -r .version .claude-plugin/plugin.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Check tag does not already exist
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "::error::Tag v${{ steps.version.outputs.version }} already exists"
            exit 1
          fi

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract the section for this version from CHANGELOG.md
          BODY=$(awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md)
          # Write to file for the release body
          echo "$BODY" > /tmp/release-body.md
          echo "Changelog extracted for v${VERSION}"

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.version.outputs.version }}" -m "Release v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --notes-file /tmp/release-body.md

  back-merge:
    name: Merge main back to dev
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dev branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: dev
          fetch-depth: 0

      - name: Merge main into dev
        id: merge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main dev
          git reset --hard origin/dev
          if git merge origin/main --no-edit; then
            git push origin dev || {
              echo "::warning::Push rejected (dev moved). Creating PR instead."
              echo "result=conflict" >> "$GITHUB_OUTPUT"
              exit 0
            }
            echo "result=success" >> "$GITHUB_OUTPUT"
          else
            git merge --abort
            echo "result=conflict" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR on merge conflict
        if: steps.merge.outputs.result == 'conflict'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing_pr="$(gh pr list --base dev --head main --state open --json number --jq '.[0].number')"
          if [ -n "$existing_pr" ] && [ "$existing_pr" != "null" ]; then
            echo "::notice::Back-merge PR already exists: #$existing_pr"
            exit 0
          fi
          gh pr create \
            --base dev \
            --head main \
            --title "chore: merge main back to dev after release" \
            --body "Automated back-merge after release. Merge conflicts need manual resolution."
