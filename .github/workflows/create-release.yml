name: Create Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Tag and release
    if: >-
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.title, 'release: ')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Extract version from .claude-plugin/plugin.json
        id: version
        run: |
          if ! VERSION=$(jq -er '.version' .claude-plugin/plugin.json); then
            echo "::error::Failed to read '.version' from .claude-plugin/plugin.json (invalid JSON, missing file, or null value)"
            exit 1
          fi
          if [ -z "$VERSION" ]; then
            echo "::error::Version is empty in .claude-plugin/plugin.json"
            exit 1
          fi
          if ! [[ "$VERSION" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Version '$VERSION' is not valid semver (expected: X.Y.Z, e.g. 1.2.3)"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Check tag does not already exist
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "::error::Tag v${{ steps.version.outputs.version }} already exists"
            exit 1
          fi

      - name: Validate marketplace versions match plugin version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if ! PLUGIN_NAME=$(jq -er '.name' .claude-plugin/plugin.json); then
            echo "::error::Failed to read '.name' from .claude-plugin/plugin.json (invalid JSON, missing file, or null value)"
            exit 1
          fi

          if ! MARKETPLACE_METADATA_VERSION=$(jq -er '.metadata.version' .claude-plugin/marketplace.json); then
            echo "::error::Failed to read '.metadata.version' from .claude-plugin/marketplace.json (invalid JSON, missing file, or null value)"
            exit 1
          fi
          if [ "$MARKETPLACE_METADATA_VERSION" != "$VERSION" ]; then
            echo "::error::.claude-plugin/marketplace.json metadata.version ($MARKETPLACE_METADATA_VERSION) must match plugin version ($VERSION)"
            exit 1
          fi

          if ! PLUGIN_MATCH_COUNT=$(jq -er --arg name "$PLUGIN_NAME" '[.plugins[] | select(.name == $name)] | length' .claude-plugin/marketplace.json); then
            echo "::error::Failed to compute plugin match count for '$PLUGIN_NAME' from .claude-plugin/marketplace.json (invalid JSON, missing file, or null value)"
            exit 1
          fi
          if [ "$PLUGIN_MATCH_COUNT" -ne 1 ]; then
            echo "::error::.claude-plugin/marketplace.json must contain exactly one plugin entry named '$PLUGIN_NAME' (found: $PLUGIN_MATCH_COUNT)"
            exit 1
          fi

          if ! MARKETPLACE_PLUGIN_VERSION=$(jq -er --arg name "$PLUGIN_NAME" '.plugins[] | select(.name == $name) | .version' .claude-plugin/marketplace.json); then
            echo "::error::Failed to read '.version' for plugin '$PLUGIN_NAME' from .claude-plugin/marketplace.json (invalid JSON, missing file, or null value)"
            exit 1
          fi
          if [ "$MARKETPLACE_PLUGIN_VERSION" != "$VERSION" ]; then
            echo "::error::.claude-plugin/marketplace.json plugin entry named '$PLUGIN_NAME' version ($MARKETPLACE_PLUGIN_VERSION) must match plugin version ($VERSION)"
            exit 1
          fi

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract the section for this version from CHANGELOG.md
          BODY=$(awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md)
          # Write to file for the release body
          echo "$BODY" > /tmp/release-body.md
          echo "Changelog extracted for v${VERSION}"

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.version.outputs.version }}" -m "Release v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --notes-file /tmp/release-body.md

  back-merge:
    name: Merge main back to dev
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dev branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: dev
          fetch-depth: 0

      - name: Merge main into dev
        id: merge
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          merge_and_push() {
            local strategy="$1"
            git reset --hard origin/dev
            if [ "$strategy" = "theirs" ]; then
              if ! git merge origin/main --no-edit -X theirs; then
                git merge --abort || true
                return 10
              fi
            else
              if ! git merge origin/main --no-edit; then
                git merge --abort || true
                return 10
              fi
            fi
            if ! git push origin HEAD:dev; then
              return 20
            fi
            return 0
          }

          result="conflict"
          fallback_reason="unresolved_conflict"
          for attempt in 1 2 3; do
            if ! git fetch origin main dev; then
              echo "::warning::git fetch failed on attempt ${attempt}; retrying..."
              fallback_reason="fetch_failure"
              continue
            fi

            rc=0
            merge_and_push "normal" || rc=$?
            if [ "$rc" -eq 0 ]; then
              echo "::notice::Back-merge completed using default merge strategy."
              result="success"
              fallback_reason="none"
              break
            fi

            if [ "$rc" -eq 10 ]; then
              echo "::warning::Default merge conflicted on attempt ${attempt}; retrying with '-X theirs' to keep main authoritative for conflicting hunks."
              rc=0
              merge_and_push "theirs" || rc=$?
              if [ "$rc" -eq 0 ]; then
                echo "::notice::Back-merge completed using '-X theirs' conflict resolution."
                result="success"
                fallback_reason="none"
                break
              fi
            fi

            if [ "$rc" -eq 20 ]; then
              echo "::warning::Push rejected on attempt ${attempt} (dev moved). Retrying with latest origin/dev."
              fallback_reason="push_race"
              continue
            fi

            fallback_reason="unresolved_conflict"
            echo "::warning::Back-merge still has unresolved conflicts after automated strategies (rc=${rc})."
            break
          done

          echo "result=${result}" >> "$GITHUB_OUTPUT"
          echo "fallback_reason=${fallback_reason}" >> "$GITHUB_OUTPUT"

      - name: Create PR on merge conflict
        if: steps.merge.outputs.result == 'conflict'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing_pr="$(gh pr list --base dev --state open --search "chore: merge main back to dev after release in:title" --json number --jq '.[0].number')"
          if [ -n "$existing_pr" ] && [ "$existing_pr" != "null" ]; then
            branch_name="$(gh pr view "$existing_pr" --json headRefName --jq '.headRefName')"
            echo "::notice::Refreshing existing back-merge PR #$existing_pr on ${branch_name}"
          else
            branch_name="backmerge-main-to-dev-${{ github.run_id }}"
          fi
          fallback_reason="${{ steps.merge.outputs.fallback_reason }}"
          if [ "$fallback_reason" = "push_race" ]; then
            pr_body="Automated back-merge after release. Back-merge push to \`dev\` failed after retries because \`dev\` changed concurrently. No merge conflict is expected; merge this PR to complete synchronization."
          elif [ "$fallback_reason" = "fetch_failure" ]; then
            pr_body="Automated back-merge after release. The workflow could not fetch the latest branches reliably after retries, so this PR is opened to complete synchronization manually."
          else
            pr_body="Automated back-merge after release. Merge conflicts remained after automated strategies. This PR uses a dedicated back-merge branch so conflict resolutions are not committed to \`main\`."
          fi
          git fetch origin main
          git checkout -B "$branch_name" origin/main
          git push origin "$branch_name" --force
          if [ -n "$existing_pr" ] && [ "$existing_pr" != "null" ]; then
            gh pr edit "$existing_pr" --body "$pr_body"
          else
            gh pr create \
              --base dev \
              --head "$branch_name" \
              --title "chore: merge main back to dev after release" \
              --body "$pr_body"
          fi
