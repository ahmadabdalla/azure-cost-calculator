name: Validate Service References

on:
  pull_request:
    paths:
      - '.github/skills/azure-cost-calculator/references/services/**/*.md'

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: Validate changed service files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get changed service files
        id: changed
        uses: tj-actions/changed-files@v46
        with:
          files: |
            .github/skills/azure-cost-calculator/references/services/**/*.md
          files_ignore: |
            .github/skills/azure-cost-calculator/references/services/TEMPLATE.md

      - name: Run validation
        if: steps.changed.outputs.any_changed == 'true'
        shell: pwsh
        run: |
          $files = "${{ steps.changed.outputs.all_changed_files }}" -split ' '
          $files = $files | Where-Object { $_ -and (Test-Path $_) }

          if ($files.Count -eq 0) {
            Write-Output "No service reference files to validate."
            exit 0
          }

          Write-Output "Validating $($files.Count) file(s):"
          $files | ForEach-Object { Write-Output "  - $_" }
          Write-Output ""

          $scriptPath = ".github/skills/azure-cost-calculator/scripts/Validate-ServiceReference.ps1"
          $servicesRoot = ".github/skills/azure-cost-calculator/references/services"

          & $scriptPath -Path $files -ServicesRoot $servicesRoot -CheckAliasUniqueness

  label:
    name: Auto-label by category
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get changed service files
        id: changed
        uses: tj-actions/changed-files@v46
        with:
          files: |
            .github/skills/azure-cost-calculator/references/services/**/*.md
          files_ignore: |
            .github/skills/azure-cost-calculator/references/services/TEMPLATE.md

      - name: Detect categories and apply labels
        if: steps.changed.outputs.any_changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const files = `${{ steps.changed.outputs.all_changed_files }}`.split(' ').filter(Boolean);
            const categories = new Set();

            for (const file of files) {
              const match = file.match(/services\/([^/]+)\//);
              if (match) categories.add(match[1]);
            }

            const labels = [...categories].map(c => `category/${c}`);
            if (labels.length === 0) return;

            // Create labels if they don't exist
            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label
                });
              } catch {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label,
                  color: '0075ca',
                  description: `Service reference: ${label.replace('category/', '')}`
                });
              }
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: labels
            });

            console.log(`Applied labels: ${labels.join(', ')}`);
